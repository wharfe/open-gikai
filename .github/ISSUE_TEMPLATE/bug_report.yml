name: Bug Report
description: Report a technical issue with the site or pipeline
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below.
        **Note:** This tracker is for technical issues only. Issues related to political opinions, editorial decisions, or requests to change how specific politicians/parties are presented will be closed without discussion.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Page URL
      description: The URL where you encountered the issue (if applicable)
      placeholder: https://open-gikai.net/t/...
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Mobile
        - Tablet
    validations:
      required: true

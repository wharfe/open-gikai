name: Uptime Check

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check site
    runs-on: ubuntu-latest
    steps:
      - name: Check open-gikai.net
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" https://open-gikai.net/)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Site returned HTTP $STATUS"
            exit 1
          fi

      - name: Check sitemap
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" https://open-gikai.net/sitemap.xml)
          echo "Sitemap status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Sitemap returned HTTP $STATUS"
          fi
